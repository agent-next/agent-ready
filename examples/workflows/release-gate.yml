# Agent Ready Release Gate
# Ensures releases have complete readiness before publishing

name: Agent Ready - Release Gate

on:
  release:
    types: [created]

jobs:
  validate-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Agent Readiness
        uses: your-org/agent-ready@v0.2
        with:
          path: '.'
          fail-on-missing: 'true'

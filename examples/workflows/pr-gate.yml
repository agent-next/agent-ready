# Agent Ready PR Gate
# Blocks PRs that have missing readiness areas

name: Agent Ready - PR Gate

on:
  pull_request:

permissions:
  contents: read

jobs:
  readiness-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check Agent Readiness
        uses: your-org/agent-ready@v0.2
        with:
          path: '.'
          fail-on-missing: 'true'

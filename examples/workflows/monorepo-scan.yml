# Monorepo Agent Ready Check
# Checks multiple packages/apps in a monorepo

name: Agent Ready - Monorepo

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check-packages:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package:
          - apps/web
          - apps/api
          - packages/shared
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Check ${{ matrix.package }}
        uses: your-org/agent-ready@v0.2
        with:
          path: ${{ matrix.package }}

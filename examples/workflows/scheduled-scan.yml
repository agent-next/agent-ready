# Scheduled Agent Ready Check
# Runs weekly to track readiness over time

name: Agent Ready - Weekly Check

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9 AM UTC
  workflow_dispatch:

jobs:
  weekly-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Agent Ready Check
        id: check
        uses: your-org/agent-ready@v0.2
        with:
          path: '.'

      - name: Print Results
        env:
          PASSED: ${{ steps.check.outputs.passed }}
        run: echo "All areas complete: $PASSED"

# Basic Agent Ready Check
# Runs on every push and PR to check repo readiness

name: Agent Ready - Basic

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Agent Ready
        uses: your-org/agent-ready@v0.2
        with:
          path: '.'
